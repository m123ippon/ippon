<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>大阪の喫煙できる喫茶店エリア選択</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 20px;
      background: #f7f7f7;
      max-width: 480px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 16px;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
    }

    .top-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: #22c55e;
      color: white;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      text-align: center;
      margin-bottom: 24px;
      font-size: 16px;
    }

    .station-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .station-grid a {
      display: block;
      width: 100%;
      background: white;
      padding: 18px;
      border-radius: 12px;
      text-decoration: none;
      color: #333;
      font-weight: 600;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      text-align: center;
      font-size: 17px;
    }

    /* PCでは2列にする（スマホは1列のまま） */
    @media (min-width: 600px) {
      .station-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>

<h1>大阪のエリアを選択</h1>

<a class="top-btn" href="#">現在地から探す</a>

<div class="station-grid">
  <a href="串揚げキッチン_だん.html?v=1">串揚げキッチン だん</a>
</div>

</body>
</html>
