<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>大阪の喫煙できる喫茶店エリア選択</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 20px;
      background: #f7f7f7;
      max-width: 480px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 16px;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
    }

    .top-btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: #22c55e;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      text-align: center;
      margin-bottom: 24px;
      font-size: 16px;
    }

    .station-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .station-grid a {
      background: white;
      padding: 16px 10px;
      border-radius: 10px;
      text-decoration: none;
      color: #333;
      font-weight: 600;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      text-align: center;
      font-size: 15px;
    }

    /* スマホ最適化 */
    @media (max-width: 480px) {
      body {
        padding: 16px;
      }
      .station-grid {
        gap: 12px;
      }
      .station-grid a {
        padding: 14px 8px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

<h1>大阪のエリアを選択</h1>

<a class="top-btn" href="#">現在地から探す</a>

<div class="station-grid">
  <a href="umeda-map.html">梅田駅</a>
  <a href="namba-map.html">なんば駅</a>
  <a href="tennoji-map.html">天王寺駅</a>
  <a href="osaka.html">大阪駅</a>
  <a href="kitahama.html">北浜駅</a>
  <a href="honmachi.html">本町駅</a>
  <a href="shinsaibashi.html">心斎橋駅</a>
  <a href="yodoyabashi.html">淀屋橋駅</a>
</div>

</body>
</html>
